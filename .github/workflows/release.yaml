on:
  push: { branches: [main] }

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    environment: version
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write, id-token: write }
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true, token: "${{ secrets.RELEASE_GITHUB_TOKEN }}" }
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: v1.5.1 }
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - id: title
        run: |
          pnpm changeset status --output=status.json 2>/dev/null || echo '{"releases":[]}' > status.json
          node -e 'const release = require("./status.json").releases.find(({ type }) => type !== "none");
            console.log("title=" + (release ? "🔖 release: v" + release.newVersion : "🔖 release"))' >> $GITHUB_OUTPUT
          rm status.json
      - uses: changesets/action@v1
        with:
          title: ${{ steps.title.outputs.title }}
          publish: pnpm changeset publish
          prDraft: create
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
